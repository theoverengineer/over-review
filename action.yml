name: 'over-review'
description: 'AI-powered Pull Request reviewer using your own model'
author: 'theoverengineer'

inputs:
  llm-model:
    description: 'LLM model to use for review (e.g., gpt-4o, claude-3.5-sonnet)'
    required: true
  llm-api-key:
    description: 'API key for the LLM provider'
    required: true
  llm-base-url:
    description: 'Base URL for the LLM API (optional, for OpenAI-compatible APIs)'
    required: false
  llm-provider:
    description: 'LLM provider (ai-sdk only in V1)'
    required: false
    default: 'ai-sdk'
  review-mode:
    description: 'Review mode: auto, manual, or cli'
    required: false
    default: 'auto'
  full-mode:
    description: 'Force full review instead of incremental'
    required: false
    default: 'false'
  llm-structured-outputs:
    description: 'Enable structured JSON outputs (set to false for custom OpenAI-compatible endpoints without schema support)'
    required: false
    default: 'true'
  style-guide-rules:
    description: 'Additional repository-specific review guidance text appended to the review prompt'
    required: false
  llm-timeout-ms:
    description: 'Timeout in milliseconds for LLM requests (0 to disable)'
    required: false
    default: '30000'
  github-api-url:
    description: 'GitHub API URL (for GitHub Enterprise or custom endpoints)'
    required: false
  github-server-url:
    description: 'GitHub server URL (for GitHub Enterprise)'
    required: false
  github-token:
    description: 'GitHub token for API authentication'
    required: false
  debug:
    description: 'Enable debug logging'
    required: false
    default: 'false'
  dry-run:
    description: 'Skip GitHub write operations'
    required: false
    default: 'false'

runs:
  using: 'node24'
  main: 'dist/action/index.js'

branding:
  icon: 'check-square'
  color: 'gray-dark'
